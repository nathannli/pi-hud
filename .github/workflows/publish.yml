name: Publish to npm

on:
  push:
    tags:
      - "v-*-RELEASE"
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "npm dist-tag (latest, next, beta)"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package contents
        run: node scripts/verify-package-files.mjs

      - name: Publish to npm
        env:
          DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs['dist-tag'] || 'latest' }}
        run: npm publish --provenance --access public --tag "$DIST_TAG"
