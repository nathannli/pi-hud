name: Bug report
description: Report something that is not working in pi-hud
title: "bug: "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search existing issues before opening a new one.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly and briefly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the problem.
      placeholder: |
        1. Install or enable pi-hud...
        2. Run...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: pi-version
    attributes:
      label: Pi version
      placeholder: "pi --version"
    validations:
      required: false
  - type: input
    id: pi-hud-version
    attributes:
      label: pi-hud version
      placeholder: "npm list -g pi-hud or project package version"
    validations:
      required: false
  - type: dropdown
    id: install-scope
    attributes:
      label: Install scope
      options:
        - Global
        - Project-local
        - Not sure
    validations:
      required: false
  - type: input
    id: os-terminal
    attributes:
      label: OS and terminal
      placeholder: "macOS 15, iTerm2 / Terminal.app / Warp / ..."
    validations:
      required: false
  - type: textarea
    id: hud-settings
    attributes:
      label: Relevant HUD settings
      description: Include any custom width, position, shortcuts, visibility, MCP, or compact settings.
      render: json
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Screenshots, logs, or extra context
      description: Add screenshots, terminal output, or anything else that helps debug the issue.
    validations:
      required: false
