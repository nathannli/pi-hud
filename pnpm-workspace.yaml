# Security overrides for audited transitive dependencies that are below patched
# advisory versions through current direct dependencies. Remove an entry only
# after `pnpm audit --audit-level moderate` stays clean without it.
overrides:
  # via vite/vitest; fixes esbuild advisory in older 0.27.x releases
  esbuild: 0.28.1
  # via @changesets/cli; fixes js-yaml <=4.1.1 advisory
  js-yaml: 4.2.0
  # via @google/genai; fixes protobufjs <=7.6.2 advisory
  protobufjs: 7.6.3
  # via @earendil-works/pi-coding-agent; fixes undici <8.5.0 advisories
  undici: 8.5.0
  # via vitest; fixes vite <=7.3.4 advisories
  vite: 7.3.5

allowBuilds:
  "@google/genai": true
  esbuild: true
  protobufjs: true

# Keep pnpm 11's default 24-hour release-age gate, but allow the
# already-reviewed clipboard optional native packages to install before the
# cooldown expires.
minimumReleaseAgeExclude:
  - "@mariozechner/clipboard@0.3.9"
  - "@mariozechner/clipboard-darwin-arm64@0.3.9"
  - "@mariozechner/clipboard-darwin-universal@0.3.9"
  - "@mariozechner/clipboard-darwin-x64@0.3.9"
  - "@mariozechner/clipboard-linux-arm64-gnu@0.3.9"
  - "@mariozechner/clipboard-linux-arm64-musl@0.3.9"
  - "@mariozechner/clipboard-linux-riscv64-gnu@0.3.9"
  - "@mariozechner/clipboard-linux-x64-gnu@0.3.9"
  - "@mariozechner/clipboard-linux-x64-musl@0.3.9"
  - "@mariozechner/clipboard-win32-arm64-msvc@0.3.9"
  - "@mariozechner/clipboard-win32-x64-msvc@0.3.9"
